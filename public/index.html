<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAW — AI-Powered College Results Automation & Export</title>
  <meta name="description" content="RAW (Results Automation Website) is a premium tool for college students to automate result collection, track academic progress, and export results to Excel with real-time AI automation." />
  <meta name="keywords" content="college results, result automation, JNTU results, GPA calculator, result scraper, academic automation, RAW results" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="slide-up">
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <!-- Splash Screen (Flash Page) -->
  <div id="intro">
    <div class="intro-content">
      <img src="/assets/logo.png" alt="RAW Logo" class="intro-logo">
      <div class="intro-loader"></div>
    </div>
  </div>

  <div id="nav" class="glass scale-in">
    <div class="nav-container">
      <div class="logo" onclick="navigate('home')">
        <img src="/assets/logo.png" alt="Logo" class="nav-logo">
      </div>
      <div class="nav-links">
        <a href="#/home">Home</a>
        <a href="#/about">About</a>
        <a href="#/contact">Contact</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
          <span class="icon">🌓</span>
        </button>
        <button class="btn btn-outline" id="navLoginBtn" onclick="navigate('login')">Sign In</button>
      </div>
    </div>
  </div>

  <div class="bg-particles" id="particles"></div>
  <div id="app"></div>

  <footer id="footer"></footer>


  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
